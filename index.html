<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineClone - Chat App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal active">
        <div class="modal-content">
            <div class="logo">
                <i class="fab fa-line"></i>
                <h1>LineClone</h1>
            </div>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Daftar</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="tab-content active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Masuk</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="tab-content">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="tel" id="regPhone" placeholder="No. Telepon">
                <button type="submit">Daftar</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="app-container hidden">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile" onclick="showProfile()">
                    <img id="sidebarAvatar" src="" alt="Profile">
                    <div>
                        <div id="sidebarUsername">-</div>
                        <div id="sidebarStatus">offline</div>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <i class="fas fa-search" onclick="toggleSearch()"></i>
                    <i class="fas fa-plus" onclick="showAddFriend()"></i>
                </div>
            </div>

            <!-- Search -->
            <div id="searchContainer" class="search-container hidden">
                <input type="text" id="searchInput" placeholder="Cari teman..." oninput="searchFriends()">
                <div id="searchResults"></div>
            </div>

            <!-- Friends List -->
            <div class="friends-list" id="friendsList">
                <div class="no-friends">Belum ada teman</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-user-info">
                    <img id="chatAvatar" src="" alt="">
                    <div>
                        <div id="chatUsername">-</div>
                        <div id="chatStatus">offline</div>
                    </div>
                </div>
                <div class="chat-actions">
                    <i class="fas fa-phone" onclick="startCall('voice')"></i>
                    <i class="fas fa-video" onclick="startCall('video')"></i>
                    <i class="fas fa-paperclip" onclick="showFilePicker()"></i>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="no-chat">Pilih teman untuk mulai chat</div>
            </div>

            <div class="chat-input-container">
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Ketik pesan..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profileModal" class="modal hidden">
            <div class="modal-content profile-modal">
                <div class="profile-header">
                    <img id="profileAvatar" src="" alt="Profile">
                    <div class="profile-info">
                        <h2 id="profileUsername">-</h2>
                        <div id="profileStatus">offline</div>
                    </div>
                </div>
                <div class="profile-details">
                    <div class="detail-item">
                        <label>Email</label>
                        <input type="email" id="profileEmail">
                    </div>
                    <div class="detail-item">
                        <label>Telepon</label>
                        <input type="tel" id="profilePhone">
                    </div>
                    <button onclick="updateProfile()">Simpan</button>
                </div>
            </div>
        </div>

        <!-- Add Friend Modal -->
        <div id="addFriendModal" class="modal hidden">
            <div class="modal-content">
                <h3>Tambahkan Teman</h3>
                <input type="text" id="friendSearch" placeholder="Cari username atau email...">
                <div id="friendResults"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
